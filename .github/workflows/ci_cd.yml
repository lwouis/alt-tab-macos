on:
  push:
    branches:
      - master

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
  SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
  SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
  GITHUB_EVENT_BEFORE: ${{ github.event.before }}
  GITHUB_EVENT_AFTER: ${{ github.event.after }}
  BUILD_DIR: ${{ github.workspace }}
  XCODE_BUILD_PATH: DerivedData/Build/Products/Release
  VERSION_FILE: VERSION.txt
  APP_NAME: AltAtlTab
  HOMEBREW_TAP_REPO: odrinateur/homebrew-altatltab
  HOMEBREW_TAP_BRANCH: main

jobs:
  release:
    runs-on: macos-15
    steps:
      - id: pre-checkout
        env:
          COMMITS: ${{ toJson(github.event.commits) }}
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            COUNT=$(( $(echo "$COMMITS" | jq length) + 30 ))
          else
            COUNT=1
          fi
          echo "fetch-depth=$COUNT" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ steps.pre-checkout.outputs.fetch-depth }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx commitlint --from "$GITHUB_EVENT_BEFORE" --to "$GITHUB_EVENT_AFTER" --verbose
      - run: scripts/ensure_generated_files_are_up_to_date.sh
      - id: version
        run: scripts/determine_next_version.sh
      - name: Stop when no release is required
        if: steps.version.outputs.skip == 'true'
        run: echo "No release required"
      - run: scripts/replace_environment_variables_in_app.sh
        if: steps.version.outputs.skip != 'true'
      - run: scripts/codesign/setup_ci_pr.sh
        if: steps.version.outputs.skip != 'true'
      - run: scripts/run_tests.sh
        if: steps.version.outputs.skip != 'true'
      - run: scripts/build_app.sh
        if: steps.version.outputs.skip != 'true'
      - run: scripts/package_release.sh
        if: steps.version.outputs.skip != 'true'
      - run: scripts/update_appcast.sh
        if: steps.version.outputs.skip != 'true'
      - run: scripts/update_readme_release.sh
        if: steps.version.outputs.skip != 'true'
      - run: npx semantic-release
        if: steps.version.outputs.skip != 'true'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      - id: set_release_info
        if: steps.version.outputs.skip != 'true'
        run: scripts/extract_latest_changelog.sh
      - uses: softprops/action-gh-release@v2
        if: steps.version.outputs.skip != 'true'
        with:
          tag_name: ${{ steps.set_release_info.outputs.tag_name }}
          name: AltAtlTab ${{ steps.version.outputs.version }}
          body: ${{ steps.set_release_info.outputs.body }}
          files: ${{ env.XCODE_BUILD_PATH }}/*.zip
      - run: scripts/update_homebrew_tap.sh
        if: steps.version.outputs.skip != 'true'
